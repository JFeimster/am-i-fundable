openapi: 3.1.0
info:
  title: Funding Readiness Helper Actions
  version: 1.0.0
  description: >-
    Public-safe GPT Action schema for Funding Readiness Helper. This action
    bundle supports scorecard submission, human review requests, public resource
    recommendations, document checklist lookup, and public site retrieval. It
    must not return approvals, offers, underwriting decisions, provider-specific
    routing, apply links, affiliate URLs, commissions, private contacts, private
    notes, credentials, or guarantees of funding.
servers:
  - url: https://am-i-fundable.vercel.app
    description: Am I Fundable production
paths:
  /api/scorecard/submit-score:
    post:
      operationId: submitScorecard
      summary: Submit scorecard answers and get a public-safe readiness result
      description: >-
        Recomputes funding readiness from user-provided answers and returns only
        public-safe readiness guidance. This is not an approval, offer,
        underwriting decision, or guarantee of funding.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - answers
              properties:
                source:
                  type: string
                  default: Funding Readiness Helper GPT
                applicant:
                  $ref: '#/components/schemas/PublicApplicant'
                answers:
                  $ref: '#/components/schemas/ScorecardAnswers'
                attribution:
                  $ref: '#/components/schemas/PublicAttribution'
            examples:
              workingCapital:
                value:
                  source: Funding Readiness Helper GPT
                  applicant:
                    businessName: Demo Business LLC
                    state: DC
                  answers:
                    businessPersona: local_service_business
                    monthlyRevenue: 25000
                    timeInBusinessMonths: 18
                    creditScore: 665
                    bankStatus: consistent
                    businessStructure: entity_with_bank
                    fundingPurpose: working_capital
                    desiredFundingAmount: 50000
                    redFlags:
                      - none
      responses:
        '200':
          description: Public-safe scorecard result.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicScoreResponse'
        '422':
          description: Invalid or incomplete scorecard answers.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/scorecard/request-review:
    post:
      operationId: requestFundingReview
      summary: Request a human funding-readiness review
      description: >-
        Validates applicant consent and scorecard answers, recomputes readiness
        server-side, and queues a public-safe review request when appropriate.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewRequest'
            examples:
              standardReview:
                value:
                  source: Funding Readiness Helper GPT
                  requestedReviewType: funding_path_review
                  applicant:
                    firstName: Demo
                    lastName: Owner
                    businessName: Demo Business LLC
                    email: demo@example.com
                    phone: '5555555555'
                    state: DC
                    consent: true
                  answers:
                    businessPersona: local_service_business
                    monthlyRevenue: 25000
                    timeInBusinessMonths: 18
                    creditScore: 665
                    bankStatus: consistent
                    businessStructure: entity_with_bank
                    fundingPurpose: working_capital
                    desiredFundingAmount: 50000
                    redFlags:
                      - none
      responses:
        '201':
          description: Review request accepted or queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '422':
          description: Invalid request or missing consent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/public/resource-recommendations:
    post:
      operationId: recommendResources
      summary: Recommend public-safe funding readiness resources
      description: >-
        Returns educational resources based on score tier, funding purpose,
        readiness context, or manual-review need.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceRecommendationRequest'
            examples:
              reviewReady:
                value:
                  tierId: fundable_review
                  fundingPurpose: working_capital
                  manualReviewRecommended: true
      responses:
        '200':
          description: Public-safe resources.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResourceRecommendationResponse'
        '422':
          description: Invalid recommendation request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/public/document-checklist:
    get:
      operationId: getDocumentChecklist
      summary: Get a funding-readiness document checklist
      description: Returns public document preparation guidance by funding purpose or public funding family.
      parameters:
        - in: query
          name: familyId
          schema:
            type: string
          description: Optional public funding family ID such as fast-working-capital.
        - in: query
          name: fundingPurpose
          schema:
            type: string
          description: Optional scorecard funding purpose such as working_capital.
      responses:
        '200':
          description: Public-safe checklist.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentChecklistResponse'
        '422':
          description: Invalid checklist request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/public/site-data:
    get:
      operationId: getPublicSiteData
      summary: Retrieve public-safe site data
      description: >-
        Returns public-safe Am I Fundable site data such as FAQs, result tiers,
        public funding path summaries, resources, CTAs, and document checklist
        datasets. This action must not be used to retrieve private routing data.
      parameters:
        - in: query
          name: dataset
          schema:
            type: string
            enum:
              - pages
              - navigation
              - ctas
              - faq
              - result-tiers
              - funding-paths
              - document-checklists
              - resources
              - embed-presets
              - seo
              - product-families
              - compliance
          description: Optional public dataset to retrieve. Omit for dataset index.
        - in: query
          name: id
          schema:
            type: string
          description: Optional entry ID inside the selected dataset.
      responses:
        '200':
          description: Public-safe site data.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '422':
          description: Invalid site-data request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    PublicApplicant:
      type: object
      additionalProperties: false
      properties:
        businessName:
          type: string
          maxLength: 180
        state:
          type: string
          minLength: 2
          maxLength: 40
    ApplicantWithConsent:
      type: object
      additionalProperties: false
      properties:
        firstName:
          type: string
          maxLength: 120
        lastName:
          type: string
          maxLength: 120
        businessName:
          type: string
          maxLength: 180
        email:
          type: string
          format: email
        phone:
          type: string
          maxLength: 40
        state:
          type: string
          minLength: 2
          maxLength: 40
        consent:
          type: boolean
      required:
        - businessName
        - email
        - consent
    PublicAttribution:
      type: object
      additionalProperties: false
      properties:
        partner_id:
          type:
            - string
            - 'null'
        tracking_link_id:
          type:
            - string
            - 'null'
        campaign_id:
          type:
            - string
            - 'null'
        widget_id:
          type:
            - string
            - 'null'
        source_url:
          type:
            - string
            - 'null'
        utm_source:
          type:
            - string
            - 'null'
        utm_medium:
          type:
            - string
            - 'null'
        utm_campaign:
          type:
            - string
            - 'null'
        utm_term:
          type:
            - string
            - 'null'
        utm_content:
          type:
            - string
            - 'null'
    ScorecardAnswers:
      type: object
      additionalProperties: false
      required:
        - businessPersona
        - monthlyRevenue
        - timeInBusinessMonths
        - creditScore
        - bankStatus
        - businessStructure
        - fundingPurpose
        - desiredFundingAmount
        - redFlags
      properties:
        businessPersona:
          type: string
          description: Public-safe business segment or persona.
        monthlyRevenue:
          type: number
          minimum: 0
        timeInBusinessMonths:
          type: number
          minimum: 0
        creditScore:
          type: number
          minimum: 0
          maximum: 850
        bankStatus:
          type: string
          enum:
            - none
            - low_inconsistent
            - consistent
            - strong_clean
            - recent_nsfs
        businessStructure:
          type: string
          enum:
            - none
            - sole_prop
            - entity_no_bank
            - entity_with_bank
            - entity_bank_ein_clean
        fundingPurpose:
          type: string
          enum:
            - working_capital
            - inventory_materials
            - growth_marketing
            - equipment_vehicle
            - real_estate
            - ecommerce_growth
            - startup_launch
            - debt_refi
            - business_credit
            - not_sure
        desiredFundingAmount:
          type: number
          minimum: 0
        redFlags:
          type: array
          minItems: 1
          items:
            type: string
            enum:
              - none
              - open_bankruptcy
              - tax_lien
              - recent_missed_payments
              - recent_nsfs
              - new_bank_account
              - existing_daily_advance
              - marketplace_suspended
              - no_current_revenue
    ScoreTier:
      type: object
      additionalProperties: false
      required:
        - id
        - label
      properties:
        id:
          type: string
          enum:
            - highly_fundable
            - fundable_review
            - selective_programs
            - not_ready_fixable
            - unknown
        label:
          type: string
        summary:
          type: string
        range:
          type: string
        leadPriority:
          type: string
          enum:
            - hot
            - warm
            - nurture
            - education
            - manual_review
    PublicScoreResult:
      type: object
      additionalProperties: false
      required:
        - score
        - tier
        - leadPriority
        - primaryFundingFamily
        - manualReviewRecommended
      properties:
        score:
          type: number
          minimum: 0
          maximum: 100
        tier:
          $ref: '#/components/schemas/ScoreTier'
        leadPriority:
          type: string
        primaryFundingFamily:
          type: string
        secondaryFundingFamilies:
          type: array
          items:
            type: string
        recommendationCards:
          type: array
          items:
            type: object
            additionalProperties: true
        strengths:
          type: array
          items:
            type: string
        risks:
          type: array
          items:
            type: string
        nextSteps:
          type: array
          items:
            type: string
        recommendedDocuments:
          type: array
          items:
            type: string
        manualReviewRecommended:
          type: boolean
        disclaimer:
          type: string
    PublicScoreResponse:
      type: object
      additionalProperties: true
      properties:
        ok:
          type: boolean
        status:
          type: string
        result:
          $ref: '#/components/schemas/PublicScoreResult'
        disclaimer:
          type: string
    ReviewRequest:
      type: object
      additionalProperties: false
      required:
        - applicant
        - answers
      properties:
        source:
          type: string
          default: Funding Readiness Helper GPT
        requestedReviewType:
          type: string
          enum:
            - funding_path_review
            - document_review
            - manual_strategy_review
          default: funding_path_review
        applicant:
          $ref: '#/components/schemas/ApplicantWithConsent'
        answers:
          $ref: '#/components/schemas/ScorecardAnswers'
        notes:
          type: string
          maxLength: 1000
    ReviewResponse:
      type: object
      additionalProperties: true
      required:
        - ok
        - reviewId
        - status
        - message
      properties:
        ok:
          type: boolean
        reviewId:
          type: string
        status:
          type: string
        message:
          type: string
        result:
          $ref: '#/components/schemas/PublicScoreResult'
        nextStep:
          type: string
        disclaimer:
          type: string
    ResourceRecommendationRequest:
      type: object
      additionalProperties: false
      properties:
        tierId:
          type: string
          enum:
            - highly_fundable
            - fundable_review
            - selective_programs
            - not_ready_fixable
        fundingPurpose:
          type: string
        manualReviewRecommended:
          type: boolean
        answers:
          $ref: '#/components/schemas/ScorecardAnswers'
        result:
          type: object
          additionalProperties: true
    ResourceRecommendationResponse:
      type: object
      additionalProperties: true
      required:
        - ok
        - count
        - resources
      properties:
        ok:
          type: boolean
        count:
          type: integer
          minimum: 0
        resources:
          type: array
          items:
            $ref: '#/components/schemas/PublicResource'
        disclaimer:
          type: string
    PublicResource:
      type: object
      additionalProperties: true
      properties:
        id:
          type: string
        title:
          type: string
        type:
          type: string
        path:
          type: string
        summary:
          type: string
    DocumentChecklistResponse:
      type: object
      additionalProperties: true
      required:
        - ok
        - title
        - items
      properties:
        ok:
          type: boolean
        familyId:
          type: string
        fundingPurpose:
          type: string
        title:
          type: string
        items:
          type: array
          items:
            type: object
            additionalProperties: true
            required:
              - id
              - label
            properties:
              id:
                type: string
              label:
                type: string
              detail:
                type: string
              required:
                type: boolean
        nextStep:
          type: string
        disclaimer:
          type: string
    ErrorResponse:
      type: object
      additionalProperties: true
      required:
        - ok
        - error
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: object
          additionalProperties: true
          required:
            - code
            - message
          properties:
            code:
              type: string
            message:
              type: string
            requestId:
              type: string
        disclaimer:
          type: string