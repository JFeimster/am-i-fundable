name: Validate Repo

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validation only — no deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install package lock dependencies if present
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --ignore-scripts
          fi

      - name: Validate JSON files
        run: npm run validate:json

      - name: Validate JavaScript syntax
        run: npm run validate:js

      - name: Scan public surfaces for private data
        run: npm run scan:private-data 2>&1 | tee private-data-scan.log

      - name: Upload private-data scan diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: private-data-scan-log
          path: private-data-scan.log
          if-no-files-found: error

      - name: Confirm workflow does not deploy
        run: |
          echo "Validation complete."
          echo "This workflow does not deploy, release, publish, or change Vercel settings."
