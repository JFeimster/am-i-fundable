name: Validate Repo

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validation only — no deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install package lock dependencies if present
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --ignore-scripts
          fi

      - name: Validate JSON files
        run: npm run validate:json

      - name: Validate JavaScript syntax
        run: npm run validate:js

      - name: Scan public surfaces for private data
        run: npm run scan:private-data

      - name: Run repository tests
        run: |
          set -o pipefail
          npm test 2>&1 | tee test-output.log

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-output
          path: test-output.log
          if-no-files-found: ignore

      - name: Build static output
        run: npm run build

      - name: Verify live production workflow
        if: github.head_ref == 'ops/relock-am-i-fundable-20260710'
        run: npm run verify:production

      - name: Confirm deployment controls remain explicit
        run: |
          node -e "const fs=require('fs');const v=JSON.parse(fs.readFileSync('vercel.json','utf8'));if(v.git?.deploymentEnabled?.['*']!==false)process.exit(1);console.log('Preview wildcard remains disabled.');"

      - name: Confirm workflow does not deploy
        run: |
          echo "Validation complete."
          echo "This workflow does not deploy, release, publish, or change Vercel settings."
